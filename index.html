* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
  background: linear-gradient(180deg, #f7f7f7 0%, #ffffff 100%);
  color: #222;
  min-height: 100vh;
}

.phone-page {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 24px 18px 120px;
  background: #fff;
}

.hero {
  background: linear-gradient(135deg, #ffffff 0%, #eeeeee 100%);
  border: 1px solid #e3e3e3;
  border-radius: 28px;
  padding: 28px 22px;
  box-shadow: 0 10px 30px rgba(0,0,0,.08);
}

.tag {
  display: inline-block;
  background: var(--kodawari-red);
  color: white;
  font-weight: bold;
  font-size: 12px;
  padding: 7px 12px;
  border-radius: 999px;
  margin-bottom: 14px;
}

h1 {
  margin: 0;
  font-size: 27px;
  line-height: 1.25;
  letter-spacing: -0.04em;
}

.lead {
  margin: 14px 0 0;
  font-size: 14px;
  line-height: 1.8;
  color: #555;
}

.section { margin-top: 22px; }
.section h2 { font-size: 18px; margin: 0 0 10px; }

.card {
  background: #fafafa;
  border: 1px solid #e6e6e6;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 10px;
  font-size: 14px;
  line-height: 1.6;
}

.kojiro-button {
  position: fixed;
  right: 18px;
  bottom: 18px;
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 2px solid white;
  background: linear-gradient(135deg, #ffffff 0%, #e9e9e9 100%);
  box-shadow: 0 12px 30px rgba(0,0,0,.26);
  cursor: pointer;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.kojiro-svg {
  width: 78px;
  height: 78px;
  animation: float 2.8s ease-in-out infinite;
  transform-origin: center bottom;
}

.owl-body { animation: breathe 2.8s ease-in-out infinite; transform-origin: 100px 125px; }
.owl-head { animation: headTilt 3.4s ease-in-out infinite; transform-origin: 100px 88px; }
.wing-left { animation: wingLeft 3s ease-in-out infinite; transform-origin: 62px 120px; }
.wing-right { animation: wingRight 3s ease-in-out infinite; transform-origin: 138px 120px; }
.eye { animation: blink 4s infinite; transform-origin: center; }
.pupil { animation: look 4.8s ease-in-out infinite; }
.beak { transition: transform .2s ease; transform-origin: 100px 107px; }

.talking .beak { animation: talk .35s ease-in-out 5; }
.happy .eye-open { display: none; }
.happy .eye-smile { display: block; }
.eye-smile { display: none; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

@keyframes breathe {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.025); }
}

@keyframes headTilt {
  0%,100% { transform: rotate(0deg); }
  35% { transform: rotate(-3deg); }
  70% { transform: rotate(2deg); }
}

@keyframes wingLeft {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(-8deg) translateY(-2px); }
}

@keyframes wingRight {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(8deg) translateY(-2px); }
}

@keyframes blink {
  0%, 45%, 100% { transform: scaleY(1); }
  48%, 52% { transform: scaleY(.08); }
}

@keyframes look {
  0%,100% { transform: translateX(0); }
  40% { transform: translateX(1.5px); }
  70% { transform: translateX(-1.5px); }
}

@keyframes talk {
  0%,100% { transform: scaleY(1); }
  50% { transform: scaleY(1.45) translateY(2px); }
}

.chat-sheet {
  position: fixed;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%) translateY(105%);
  width: min(430px, 100%);
  height: 78vh;
  background: white;
  border-radius: 28px 28px 0 0;
  box-shadow: 0 -20px 50px rgba(0,0,0,.18);
  z-index: 30;
  transition: transform .28s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-sheet.open { transform: translateX(-50%) translateY(0); }

.chat-header {
  background: linear-gradient(135deg, #3a3a3a 0%, #1f1f1f 100%);
  color: white;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 4px solid var(--kodawari-red);
}

.chat-header-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: bold;
}

.header-icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.header-icon .kojiro-svg {
  width: 36px;
  height: 36px;
  animation: none;
}

.close-btn {
  border: none;
  background: rgba(255,255,255,.18);
  color: white;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
}

.messages {
  flex: 1;
  overflow-y: auto;
  background: #f7f7f7;
  padding: 14px;
}

.bubble {
  background: #ffffff;
  border: 1px solid #e6e6e6;
  padding: 11px 13px;
  border-radius: 16px;
  margin-bottom: 10px;
  line-height: 1.55;
  font-size: 14px;
  animation: pop .25s ease-out;
}

.bubble.user {
  background: #f1f1f1;
  border-left: 4px solid var(--kodawari-red);
  margin-left: 24px;
}

@keyframes pop {
  from { transform: scale(.92); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.quick-area {
  padding: 12px 14px;
  border-top: 1px solid #e5e5e5;
  background: #fff;
}

.quick-title {
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 8px;
  color: #555;
}

.quick-buttons {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
}

.quick-buttons button {
  white-space: nowrap;
  border: 1px solid #d9d9d9;
  background: #f7f7f7;
  color: #222;
  padding: 9px 12px;
  border-radius: 999px;
  font-size: 13px;
  cursor: pointer;
}

.quick-buttons button:hover {
  border-color: var(--kodawari-red);
  color: var(--kodawari-red);
}

.input-area {
  display: flex;
  gap: 8px;
  padding: 12px 14px 16px;
  background: white;
  border-top: 1px solid #eee;
}

input {
  flex: 1;
  border: 1px solid #ddd;
  border-radius: 999px;
  padding: 12px 14px;
  font-size: 16px;
  outline: none;
}

.send {
  border: none;
  background: var(--kodawari-red);
  color: white;
  border-radius: 999px;
  padding: 0 16px;
  font-weight: bold;
  cursor: pointer;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.25);
  z-index: 25;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s ease;
}

.overlay.open {
  opacity: 1;
  pointer-events: auto;
}

  </section>

  <script>
    const sheet = document.getElementById('chatSheet');
    const overlay = document.getElementById('overlay');
    const messages = document.getElementById('messages');
    const input = document.getElementById('userInput');
    const mainOwl = document.getElementById('mainOwl');

    const mainAnswers = {
      '未経験でも大丈夫？': '<b>コジロー:</b> 未経験からスタートしている社員もいる想定です。まずは研修制度や成長ロードマップを見るのがおすすめです。',
      '研修制度について': '<b>コジロー:</b> 研修制度について確認したい場合は、入社後の学習フローやサポート体制を見るのがおすすめです。',
      'SESについて': '<b>コジロー:</b> SESについて不安に感じる学生も多いため、まずは働き方や配属後のイメージを確認することが大切です。',
      '会社の雰囲気': '<b>コジロー:</b> 会社の雰囲気を知りたい場合は、社員紹介やインタビューを見ると、働く人の人柄が伝わりやすいです。',
      '職種について': '<b>コジロー:</b> 営業・開発・インフラなど、複数の職種から自分に合う働き方を確認できます。',
      '福利厚生について': '<b>コジロー:</b> 福利厚生や制度については、募集要項ページで確認するのがおすすめです。詳しくは採用担当に確認してください。'
    };

    function openChat() {
      sheet.classList.add('open');
      overlay.classList.add('open');
    }

    function closeChat() {
      sheet.classList.remove('open');
      overlay.classList.remove('open');
    }

    function addMessage(text, type = '') {
      const div = document.createElement('div');
      div.className = 'bubble ' + type;
      div.innerHTML = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function animateOwl() {
      mainOwl.classList.add('talking', 'happy');
      setTimeout(() => mainOwl.classList.remove('talking', 'happy'), 1800);
    }

    function selectQuestion(question) {
      addMessage('<b>あなた:</b> ' + question, 'user');
      setTimeout(() => {
        animateOwl();
        addMessage(mainAnswers[question]);
      }, 450);
    }

    function chat() {
      const val = input.value.trim();
      if (!val) return;
      input.value = '';
      addMessage('<b>あなた:</b> ' + val, 'user');
      setTimeout(() => {
        animateOwl();
        addMessage('<b>コジロー:</b> 詳細については、面談や採用担当への確認をおすすめします。');
      }, 450);
    }
  </script>
